<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — VERTEXAS</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,400&family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #002D72;
      --blue:    #0056D2;
      --bg:      #ffffff;
      --surface: #F8F9FA;
      --border:  #EEEEEE;
      --text:    #1A1A1B;
      --body:    #4A4A4A;
      --muted:   #888;
      --success: #2ECC71;
      --error:   #E74C3C;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--surface);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ── LEFT PANEL ── */
    .panel-left {
      background: var(--primary);
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    .panel-left::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: rgba(0,86,210,0.3);
      top: -200px; left: -200px;
      pointer-events: none;
    }
    .panel-left::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      bottom: -100px; right: -100px;
      pointer-events: none;
    }
    .panel-logo { display: flex; align-items: center; gap: 0.7rem; position: relative; z-index: 1; }
    .panel-logo-mark {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .panel-logo-text { font-weight: 800; font-size: 1.2rem; color: #fff; }
    .panel-hero { position: relative; z-index: 1; }
    .panel-hero h2 {
      font-family: 'Fraunces', serif;
      font-size: 2.8rem;
      font-weight: 600;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 1.2rem;
      letter-spacing: -0.02em;
    }
    .panel-hero h2 em { font-style: italic; color: rgba(255,255,255,0.7); }
    .panel-hero p { font-size: 0.95rem; color: rgba(255,255,255,0.6); line-height: 1.8; max-width: 320px; }
    .panel-stats { display: flex; gap: 2rem; position: relative; z-index: 1; }
    .panel-stat-num { font-family: 'Lexend', sans-serif; font-size: 1.8rem; font-weight: 600; color: #fff; line-height: 1; }
    .panel-stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 0.25rem; }

    /* ── RIGHT PANEL (FORM) ── */
    .panel-right {
      display: flex; flex-direction: column; justify-content: center;
      padding: 3rem 4rem;
      background: var(--bg);
      min-height: 100vh;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--muted); text-decoration: none;
      font-size: 0.85rem; font-weight: 500;
      margin-bottom: 3rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--primary); }
    .form-head { margin-bottom: 2.5rem; }
    .form-title {
      font-family: 'Fraunces', serif;
      font-size: 2rem; font-weight: 600;
      color: var(--text); margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }
    .form-subtitle { font-size: 0.9rem; color: var(--muted); }
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block;
      font-size: 0.8rem; font-weight: 600;
      color: var(--body); margin-bottom: 0.5rem;
    }
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 0.85rem 1rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.92rem;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,86,210,0.1);
    }
    .form-input::placeholder { color: #ccc; }
    .btn-primary {
      width: 100%;
      background: var(--primary); color: #fff;
      border: none; padding: 0.95rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600; font-size: 0.92rem;
      border-radius: 8px; cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top: 0.5rem;
    }
    .btn-primary:hover { background: var(--blue); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,86,210,0.25); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .error-message {
      background: rgba(231,76,60,0.08);
      border: 1.5px solid rgba(231,76,60,0.3);
      color: var(--error);
      padding: 0.85rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.85rem;
      border-radius: 8px;
      display: none;
    }
    .error-message.show { display: block; }
    .success-message {
      background: rgba(46,204,113,0.08);
      border: 1.5px solid rgba(46,204,113,0.3);
      color: var(--success);
      padding: 0.85rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.85rem;
      border-radius: 8px;
      display: none;
    }
    .success-message.show { display: block; }
    .loading {
      text-align: center; color: var(--blue);
      margin: 0.75rem 0; font-size: 0.85rem;
      display: none; font-weight: 500;
    }
    .loading.show { display: block; }
    .mfa-section { display: none; }
    .mfa-section.show { display: block; }
    .auth-footer {
      text-align: center; margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem; color: var(--muted);
    }
    .auth-link { color: var(--blue); text-decoration: none; font-weight: 600; transition: opacity 0.15s; }
    .auth-link:hover { opacity: 0.75; }

    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .panel-left { display: none; }
      .panel-right { padding: 2rem; }
    }
  </style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="panel-left">
  <div class="panel-logo">
    <div class="panel-logo-mark">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2L16 14H2L9 2Z" fill="white" fill-opacity="0.9"/></svg>
    </div>
    <div class="panel-logo-text">VERTEXAS</div>
  </div>

  <div class="panel-hero">
    <h2>Intelligence in<br><em>motion.</em></h2>
    <p>Welcome back. Your data, your insights, and your workflow automations are ready and waiting.</p>
  </div>

  <div class="panel-stats">
    <div>
      <div class="panel-stat-num">98%</div>
      <div class="panel-stat-label">Uptime SLA</div>
    </div>
    <div>
      <div class="panel-stat-num">200+</div>
      <div class="panel-stat-label">Integrations</div>
    </div>
    <div>
      <div class="panel-stat-num">&lt;1s</div>
      <div class="panel-stat-label">Data Refresh</div>
    </div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="panel-right">
  <a href="VERTEXAS.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to Home
  </a>

  <div class="form-head">
    <h1 class="form-title">Welcome back</h1>
    <p class="form-subtitle">Sign in to access your dashboard</p>
  </div>

  <div id="errorMessage" class="error-message"></div>
  <div id="successMessage" class="success-message"></div>
  <div id="loading" class="loading">Signing in…</div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="email" required autocomplete="email" placeholder="your@company.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" required autocomplete="current-password" placeholder="••••••••"/>
    </div>
    <div class="form-group mfa-section" id="mfaSection">
      <label class="form-label">MFA Code (6 digits)</label>
      <input type="text" class="form-input" id="mfaCode" maxlength="6" pattern="[0-9]{6}" placeholder="000000"/>
    </div>
    <button type="submit" class="btn-primary" id="loginBtn">Sign In →</button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="register.html" class="auth-link">Create Account</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://aailluuzuldrkxgyamob.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaWxsdXV6dWxkcmt4Z3lhbW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTg4MjYsImV4cCI6MjA4ODg5NDgyNn0.JfTV2YUOWBDKTILjGqZHufkVJgr6FBH5pv8etYJUNyY'
  );

  async function routeToDashboard(userId) {
    const { data: profile } = await sb.from('profiles').select('organization_id').eq('id', userId).single();
    if (!profile?.organization_id) { window.location.href = 'VERTEXAS-Onboarding.html'; return; }
    const { data: org } = await sb.from('organizations').select('plan').eq('id', profile.organization_id).single();
    const plan = org?.plan || 'starter';
    if (plan === 'apex')   { window.location.href = 'VERTEXAS-Apex-Dashboard.html'; return; }
    if (plan === 'growth') { window.location.href = 'VERTEXAS-Growth-Dashboard.html'; return; }
    window.location.href = 'VERTEXAS-Basic-Dashboard.html';
  }

  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) { routeToDashboard(session.user.id); }
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorEl  = document.getElementById('errorMessage');
    const successEl= document.getElementById('successMessage');
    const loadingEl= document.getElementById('loading');
    const loginBtn = document.getElementById('loginBtn');
    errorEl.classList.remove('show');
    successEl.classList.remove('show');
    loadingEl.classList.add('show');
    loginBtn.disabled = true;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    loadingEl.classList.remove('show');
    loginBtn.disabled = false;
    if (error) { errorEl.textContent = error.message; errorEl.classList.add('show'); return; }
    successEl.textContent = 'Login successful! Redirecting…';
    successEl.classList.add('show');
    setTimeout(async () => {
      const { data: profile } = await sb.from('profiles').select('onboarding_complete, organization_id').eq('id', data.user.id).single();
      if (profile?.onboarding_complete && profile?.organization_id) {
        await routeToDashboard(data.user.id);
      } else {
        window.location.href = 'VERTEXAS-Onboarding.html';
      }
    }, 800);
  });
</script>
</body>
</html>
